<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cosmic-content" style="position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px;">
        
        <header>
            <h1>Cosmic Explorer</h1>
        </header>

        <section class="controls">
            <label for="date-picker">Choose a date:</label>
            <input type="date" id="date-picker">
            <button id="search-btn">Explore</button>
            <button id="random-btn">Surprise Me</button>
        </section>

        <main>
            <h2 id="apod-title"></h2>
            <p id="apod-date"></p>
            <div id="media-container"></div>
            <p id="apod-explanation"></p>
        </main>

    </div>

    <script src="app.js"></script>
</body>
</html>
